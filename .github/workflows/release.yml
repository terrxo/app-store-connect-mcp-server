name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run bundle

      - name: Rename bundle with version
        run: cp dist/bundle.cjs dist/appstore-connect-mcp-${{ github.ref_name }}.cjs

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bundle.cjs
            dist/appstore-connect-mcp-${{ github.ref_name }}.cjs
          generate_release_notes: true
          fail_on_unmatched_files: true
